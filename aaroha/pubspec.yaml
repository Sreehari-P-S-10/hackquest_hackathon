name: aaroha
description: Aaroha — Rise, one day at a time. A recovery support app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.0

  # Environment
  flutter_dotenv: ^5.1.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.4

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # Local storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1

  # Icons & Assets
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

  cupertino_icons: ^1.0.8

  # ── Audio (Shanti Space) ─────────────────────────────────
  # Local .mp3 soundscapes (Rain, Forest, Ocean, Night)
  audioplayers: ^6.1.0

  # Text-to-speech voice guidance during breathwork
  flutter_tts: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
        - asset: assets/fonts/Manrope-ExtraBold.ttf
          weight: 800

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
    # ── Audio assets for Shanti Space soundscapes ─────────
    # Drop your .mp3 files here before running `flutter pub get`
    # Required files:
    #   assets/audio/rain.mp3
    #   assets/audio/forest.mp3
    #   assets/audio/ocean.mp3
    #   assets/audio/night.mp3
    - assets/audio/
